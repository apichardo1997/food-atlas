<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Atlas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header - compact */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f8b500, #fc8d59, #ef6548);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Tabs in header */
    .tabs {
      display: flex;
      gap: 0;
    }

    .tab-btn {
      padding: 10px 20px;
      font-size: 0.85rem;
      color: #8a8ab0;
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn:hover { color: #e0e0e0; }
    .tab-btn.active {
      color: #fc8d59;
      border-bottom-color: #fc8d59;
    }

    .tab-content { display: none; flex: 1; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* Map controls */
    .map-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: #141422;
      border-bottom: 1px solid #2a2a4a;
    }

    .map-controls label {
      font-size: 0.85rem;
      color: #aaa;
    }

    .map-controls select {
      padding: 8px 14px;
      font-size: 0.85rem;
      border-radius: 6px;
      border: 1px solid #3a3a5a;
      background: #1a1a2e;
      color: #e0e0e0;
      cursor: pointer;
      min-width: 220px;
    }

    .map-controls select:focus {
      outline: none;
      border-color: #fc8d59;
    }

    /* Map fills remaining space */
    .map-frame {
      flex: 1;
      position: relative;
      border: none;
      overflow: hidden;
      background: #1a1a2e;
    }

    .map-frame iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Placeholder */
    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #3a3a5a;
      background: #1a1a2e;
      color: #5a5a7a;
      font-size: 1.1rem;
      margin: 20px;
      border-radius: 12px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 10px;
      color: #ffffff;
      font-size: 0.75rem;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
    }
  </style>
</head>
<body>

  <header>
    <h1>Food Atlas</h1>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('climate')">Climate</button>
      <button class="tab-btn" onclick="switchTab('food')">Food Similarity</button>
      <button class="tab-btn" onclick="switchTab('elevation')">Elevation</button>
      <button class="tab-btn" onclick="switchTab('geography')">Geography</button>
    </div>
  </header>

  <!-- CLIMATE TAB -->
  <div id="tab-climate" class="tab-content active">
    <div class="map-controls">
      <label>Perspective from:</label>
      <select onchange="changeMap('climate-iframe', this.value)">
        <option value="maps/interactive_avg_climate_similarity.html">Global Average</option>
        <option value="maps/interactive_esp_climate_similarity.html">Spain</option>
        <option value="maps/interactive_usa_climate_similarity.html">United States</option>
        <option value="maps/interactive_bra_climate_similarity.html">Brazil</option>
        <option value="maps/interactive_jpn_climate_similarity.html">Japan</option>
        <option value="maps/interactive_deu_climate_similarity.html">Germany</option>
        <option value="maps/interactive_ind_climate_similarity.html">India</option>
        <option value="maps/interactive_nga_climate_similarity.html">Nigeria</option>
        <option value="maps/interactive_aus_climate_similarity.html">Australia</option>
      </select>
    </div>
    <div class="map-frame">
      <iframe id="climate-iframe" src="maps/interactive_avg_climate_similarity.html"></iframe>
    </div>
  </div>

  <!-- FOOD SIMILARITY TAB -->
  <div id="tab-food" class="tab-content">
    <div class="map-controls">
      <label>View:</label>
      <select onchange="changeMap('food-iframe', this.value)">
        <option value="maps/average_similarity_map.html">Average Food Similarity</option>
        <option value="maps/similarity_to_china_map.html">Similarity to China</option>
      </select>
    </div>
    <div class="map-frame">
      <iframe id="food-iframe" src="maps/average_similarity_map.html"></iframe>
    </div>
  </div>

  <!-- ELEVATION TAB -->
  <div id="tab-elevation" class="tab-content">
    <div class="map-controls">
      <label>View:</label>
      <select onchange="changeMap('elevation-iframe', this.value)">
        <option value="maps/interactive_elevation_map.html">Population-Weighted Elevation</option>
        <option value="maps/interactive_elevation_similarity.html">Average Elevation Similarity</option>
      </select>
    </div>
    <div class="map-frame">
      <iframe id="elevation-iframe" src="maps/interactive_elevation_map.html"></iframe>
    </div>
  </div>

  <!-- GEOGRAPHY TAB -->
  <div id="tab-geography" class="tab-content">
    <div class="map-controls">
      <label>View:</label>
      <select onchange="changeMap('geography-iframe', this.value)">
        <option value="maps/interactive_seafood_share.html">Seafood Share of Diet</option>
        <option value="maps/interactive_coastal_access.html">Coastal vs Landlocked</option>
      </select>
    </div>
    <div class="map-frame">
      <iframe id="geography-iframe" src="maps/interactive_seafood_share.html"></iframe>
    </div>
  </div>

  <footer>
    Exploring how geography, climate, trade, and culture shape what countries eat | Ana Pichardo, Tina W., Megan Yeo, Lisbeth | BSE Geospatial Data Science, Spring 2026
  </footer>

  <script>
    function changeMap(iframeId, url) {
      document.getElementById(iframeId).src = url;
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      event.target.classList.add('active');
    }
  </script>

</body>
</html>
